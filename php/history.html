<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Booking History</title>
  <link rel="stylesheet" href="style.css" />
  <script src="history.js" defer></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 900px;
      width: 100%;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.08);
    }

    h2 {
      color: #007bff;
      text-align: center;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 10px 24px;
      font-size: 16px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      text-decoration: none;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .btn:hover {
      background-color: #0056b3;
    }

    #historyContent {
      margin-top: 20px;
    }

    #chatbot {
      margin-top: 30px;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #f9f9f9;
    }

    #queryForm {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    #question {
      flex: 1;
      min-width: 260px;
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      box-sizing: border-box;
    }

    #loading {
      display: none;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      color: #0056b3;
      font-weight: 600;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid #cfe0ff;
      border-top: 3px solid #0056b3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    #response {
      margin-top: 10px;
      background: #eef;
      padding: 10px;
      border-radius: 5px;
      white-space: pre-wrap;
      min-height: 40px;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>📜 All Booking History</h2>
    <a href="index.php" class="btn">← Back to Main Panel</a>
    <a href="export.php" class="btn btn-export" style="background-color: green;">⬇ Export CSV</a>

    <div id="historyContent"></div>

    <div id="chatbot">
      <h3>💬 Ask about booking history</h3>
      <form id="queryForm">
        <input type="text" id="question" placeholder="e.g. How many bookings are assigned?" required>
        <button type="submit">Ask</button>
      </form>
      <div id="loading">
        <div class="spinner"></div>
        <span>Generating response...</span>
      </div>
      <div id="response"></div>
    </div>
  </div>

  <script>
document.addEventListener("DOMContentLoaded", () => {
    // Step 1: Update CSV silently
    fetch("export.php?mode=update")
      .then(() => {
        // Step 2: Load booking history table as HTML
        return fetch("export.php?mode=html");
      })
      .then(r => r.text())
      .then(html => {
        document.getElementById("historyContent").innerHTML = html;
      });

    // Step 3: Handle chatbot
    document.getElementById('queryForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const loading = document.getElementById('loading');
      const responseBox = document.getElementById('response');
      const formData = new FormData();
      formData.append('question', document.getElementById('question').value);
      loading.style.display = 'flex';
      responseBox.innerText = '';

      const res = await fetch('http://localhost:8000/ask', {
          method: 'POST',
          body: formData
      });

      if (!res.ok) {
          loading.style.display = 'none';
          responseBox.innerText = 'Failed to get a response from the chatbot.';
          return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let result = '';
      let hasStarted = false;

      while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value, { stream: true });
          if (chunk && !hasStarted) {
              hasStarted = true;
              loading.style.display = 'none';
          }

          result += chunk;
          responseBox.innerText = result;
      }

      if (!hasStarted) {
          loading.style.display = 'none';
      }
    });

    // Step 4: Export button click for download
    const exportBtn = document.querySelector(".btn-export");
    if (exportBtn) {
        exportBtn.addEventListener("click", function(e) {
            e.preventDefault();
            window.location.href = "export.php";
        });
    }
});
</script>
</body>
</html>
