<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Booking CSV Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background: #f5f7fb;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.08);
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #0056b3;
      text-decoration: none;
      font-weight: bold;
    }

    form {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      flex: 1;
      min-width: 260px;
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: white;
    }

    button:hover {
      background: #0056b3;
    }

    #loading {
      display: none;
      align-items: center;
      gap: 10px;
      margin: 12px 0;
      color: #0056b3;
      font-weight: bold;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid #cfe0ff;
      border-top: 3px solid #0056b3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    #response {
      margin-top: 12px;
      padding: 14px;
      min-height: 40px;
      background: white;
      border: 1px solid #d9e2f1;
      border-radius: 8px;
      white-space: pre-wrap;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="history.html" class="back-link">&larr; Back to Booking History</a>
    <h2>💬 Ask about booking history</h2>
    <form id="queryForm">
      <input type="text" id="question" placeholder="e.g. How many assigned bookings?" required>
      <button type="submit">Ask</button>
    </form>
    <div id="loading">
      <div class="spinner"></div>
      <span>Generating response...</span>
    </div>
    <div id="response"></div>
  </div>

  <script>
    document.getElementById('queryForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const loading = document.getElementById('loading');
      const responseBox = document.getElementById('response');
      const formData = new FormData();
      formData.append('question', document.getElementById('question').value);
      loading.style.display = 'flex';
      responseBox.innerText = '';

      const res = await fetch('http://localhost:8000/ask', {
        method: 'POST',
        body: formData
      });

      if (!res.ok) {
        loading.style.display = 'none';
        responseBox.innerText = 'Failed to get a response from the chatbot.';
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let result = '';
      let hasStarted = false;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        if (chunk && !hasStarted) {
          hasStarted = true;
          loading.style.display = 'none';
        }

        result += chunk;
        responseBox.innerText = result;
      }

      if (!hasStarted) {
        loading.style.display = 'none';
      }
    });
  </script>
</body>
</html>
